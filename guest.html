<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Anonymous Complaint | IntegraHelp</title>

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/forms.css">

    <style>
        .info-box {
            background: #fff3cd;
            border-left: 5px solid #ffc107;
            padding: 15px;
            margin: 20px auto;
            width: 70%;
            font-size: 14px;
        }

        .page-title {
            text-align: center;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<div class="page-title">
    <h2>Raise Anonymous Complaint</h2>
    <p><b>IntegraHelp – Ethics & Confidential Reporting</b></p>
</div>

<div class="info-box">
    🔒 <b>Your identity will NOT be recorded.</b><br>
    This portal is meant for ethics, harassment, safety, or sensitive issues.
    Please provide accurate information to help us investigate effectively.
</div>

<form id="guestComplaintForm">

    <!-- Department Selection -->
    <label>Department</label>
    <select id="department" required>
        <option value="">Select Department</option>
        <option>HR</option>
        <option>Infrastructure</option>
        <option>IT Support</option>
        <option>Administration</option>
        <option>Security</option>
        <option>Legal / Ethics</option>
    </select>

    <!-- Complaint Type -->
    <label>Issue Category</label>
    <select id="category" required>
        <option value="">Select Issue</option>
        <option value="Harassment">Harassment</option>
        <option value="Policy Violation">Policy Violation</option>
        <option value="Workplace Safety">Workplace Safety</option>
        <option value="Unethical Behavior">Unethical Behavior</option>
        <option value="Other">Other</option>
    </select>

    <!-- Dynamic Inputs -->
    <div id="dynamicFields"></div>

    <!-- Description -->
    <label>Description</label>
    <textarea id="description"
              placeholder="Describe the issue with as much detail as possible"
              required></textarea>

    <!-- Submit -->
    <button type="submit">Submit Anonymous Complaint</button>

</form>

<script>
/* ===========================
   Dynamic Fields per Category
=========================== */

document.getElementById("category").addEventListener("change", function () {
    const dynamic = document.getElementById("dynamicFields");
    dynamic.innerHTML = "";

    if (this.value === "Harassment") {
        dynamic.innerHTML = `
            <label>Incident Location</label>
            <input type="text" placeholder="Floor / ODC / Location">

            <label>Incident Date</label>
            <input type="date">
        `;
    }

    if (this.value === "Workplace Safety") {
        dynamic.innerHTML = `
            <label>Risk Type</label>
            <input type="text" placeholder="Fire / Electrical / Structural etc.">

            <label>Location</label>
            <input type="text" placeholder="Building / Floor">
        `;
    }
});

/* ===========================
   Submit Anonymous Complaint
=========================== */

document.getElementById("guestComplaintForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const payload = {
        department: document.getElementById("department").value,
        category: document.getElementById("category").value,
        description: document.getElementById("description").value,
        isAnonymous: true
    };

    fetch("http://localhost:8080/api/complaints", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
    })
    .then(response => {
        if (response.ok) {
            alert("✅ Your anonymous complaint has been submitted successfully.");
            window.location.href = "index.html";
        } else {
            alert("❌ Failed to submit complaint. Please try again.");
        }
    })
    .catch(() => {
        alert("❌ Server error. Please try later.");
    });
});
</script>

</body>
</html>
